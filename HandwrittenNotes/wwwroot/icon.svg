<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="lc">
      <rect x="8" y="9" width="24" height="46"/>
    </clipPath>
    <clipPath id="rc">
      <rect x="32" y="9" width="24" height="46"/>
    </clipPath>
  </defs>

  <!-- Cover background -->
  <rect width="64" height="64" rx="12" fill="#163552"/>

  <!-- Full paper -->
  <rect x="8" y="9" width="48" height="46" rx="4" fill="#f9fafb"/>

  <!-- Right half: warmer paper tone for drawing side -->
  <rect x="32" y="9" width="24" height="46" clip-path="url(#rc)" fill="#fffef8"/>

  <!-- Left half: notebook ruled lines -->
  <g clip-path="url(#lc)">
    <line x1="8"  y1="22" x2="32" y2="22" stroke="#b0c4de" stroke-width="1.2"/>
    <line x1="8"  y1="29" x2="32" y2="29" stroke="#b0c4de" stroke-width="1.2"/>
    <line x1="8"  y1="36" x2="32" y2="36" stroke="#b0c4de" stroke-width="1.2"/>
    <line x1="8"  y1="43" x2="32" y2="43" stroke="#b0c4de" stroke-width="1.2"/>
    <line x1="8"  y1="50" x2="32" y2="50" stroke="#b0c4de" stroke-width="1.2"/>
    <!-- Margin line -->
    <line x1="17" y1="9"  x2="17" y2="55" stroke="#ff9999" stroke-width="1.2"/>
  </g>

  <!-- Right half: single fluid pen stroke -->
  <g clip-path="url(#rc)">
    <path d="M36 15 C50 19 34 28 46 35 C58 42 36 49 46 54"
          stroke="#1a2035" stroke-width="2.4" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Centre divider -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#d0d8e0" stroke-width="0.8"/>
</svg>
